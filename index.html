<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArchLens Strategic Systems | Engineering Citadel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=JetBrains+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --citadel-bg: #020202;
            --citadel-panel: #0d1117;
            --citadel-border: rgba(48, 54, 61, 0.5);
            --citadel-accent: #2f81f7;
            --citadel-success: #3fb950;
            --citadel-danger: #f85149;
            --citadel-warning: #d29922;
            --citadel-text: #e6edf3;
            --citadel-text-muted: #8b949e;
            --citadel-glass: rgba(13, 17, 23, 0.85);
            --gpu-hint: translateZ(0);
        }
        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--citadel-bg);
            color: var(--citadel-text);
            margin: 0;
            overflow: hidden;
            letter-spacing: -0.01em;
            cursor: default;
        }
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
        .tactical-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            transform: var(--gpu-hint);
        }
        .grid-background {
            background-image: radial-gradient(circle at 2px 2px, rgba(47, 129, 247, 0.03) 1px, transparent 0);
            background-size: 40px 40px;
            opacity: 0.8;
        }
        .scanline-effect {
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.05) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.01), rgba(0, 255, 0, 0.005), rgba(0, 0, 255, 0.01));
            background-size: 100% 4px, 4px 100%;
            z-index: 9999;
            opacity: 0.1;
        }
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: var(--citadel-bg);
        }
        ::-webkit-scrollbar-thumb {
            background: #21262d;
            border-radius: 10px;
            border: 1px solid var(--citadel-bg);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--citadel-accent);
        }
        ::selection {
            background-color: rgba(47, 129, 247, 0.25);
            color: var(--citadel-text);
        }
        .glass-card {
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            background: var(--citadel-glass);
            border: 1px solid var(--citadel-border);
            box-shadow: 0 12px 40px -10px rgba(0, 0, 0, 0.7);
        }
        .glow-text-blue {
            text-shadow: 0 0 15px rgba(47, 129, 247, 0.4);
        }
        @keyframes sentinel-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(47, 129, 247, 0); }
            50% { box-shadow: 0 0 0 8px rgba(47, 129, 247, 0.1); }
        }
        .animate-pulse-sentinel {
            animation: sentinel-pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 8s linear infinite;
        }
        button:focus-visible, a:focus-visible {
            outline: 2px solid var(--citadel-accent);
            outline-offset: 4px;
        }
        .custom-scrollbar {
            scrollbar-width: thin;
            scrollbar-color: #21262d var(--citadel-bg);
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom": "https://esm.sh/react-dom@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.39.0",
    "d3": "https://esm.sh/d3@^7.9.0"
  }
}
</script>
</head>
<body>
    <div class="tactical-overlay grid-background"></div>
    <div class="tactical-overlay scanline-effect"></div>
    <div id="root" style="position: relative; z-index: 10;"></div>
    <script type="module" src="./index.tsx"></script>
</body>
</html>
